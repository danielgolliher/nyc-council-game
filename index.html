* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a0a;

    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
}
canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 4px solid #333;
}
#coming-soon-banner {
    width: 808px;
    background: linear-gradient(135deg, #1a3a5c, #2980b9);
    color: #fff;
    text-align: center;
    padding: 10px 16px;
    font: bold 13px 'Courier New', monospace;
    letter-spacing: 0.5px;
    border: 4px solid #333;
    border-bottom: 2px solid #ffd700;
    border-radius: 4px 4px 0 0;
}
#game-wrap canvas { border-top: none; border-radius: 0 0 0 0; }
#game-wrap { position: relative; }
#music-btn {
    position: absolute;
    bottom: 12px;
    left: 12px;
    z-index: 10;
    padding: 6px 12px;
    font: bold 12px 'Courier New', monospace;
    background: rgba(10,10,30,0.85);
    color: #888;
    border: 2px solid #444;
    border-radius: 4px;
    cursor: pointer;
}
#music-btn:hover { border-color: #888; color: #fff; }
#music-btn.on { color: #ffd700; border-color: #ffd700; }
#zoom-controls {
    position: absolute;
    bottom: 12px;
    left: 110px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 4px;
}
#zoom-controls button {
    width: 28px; height: 28px;
    font: bold 14px 'Courier New', monospace;
    background: rgba(10,10,30,0.85);
    color: #aaa;
    border: 2px solid #444;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
#zoom-controls button:hover { border-color: #888; color: #fff; }
#zoom-level {
    font: bold 11px 'Courier New', monospace;
    color: #ccc;
    background: rgba(10,10,30,0.85);
    padding: 4px 8px;
    border-radius: 3px;
    min-width: 38px;
    text-align: center;
}
#search-box {
    display: none;
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 380px;
}
#search-box.active { display: block; }
#addr-input {
    width: 100%;
    padding: 8px 12px;
    font: 14px 'Courier New', monospace;
    background: rgba(10,10,30,0.95);
    color: #fff;
    border: 2px solid #2980b9;
    border-radius: 4px;
    outline: none;
}
#addr-input::placeholder { color: #666; }
#addr-input:focus { border-color: #3498db; }
#addr-results {
    max-height: 200px;
    overflow-y: auto;
    background: rgba(10,10,30,0.95);
    border: 2px solid #2980b9;
    border-top: none;
    border-radius: 0 0 4px 4px;
}
#addr-results:empty { display: none; }
.addr-result {
    padding: 8px 12px;
    font: 12px 'Courier New', monospace;
    color: #ccc;
    cursor: pointer;
    border-bottom: 1px solid #1a1a3a;
}
.addr-result:hover, .addr-result.selected {
    background: rgba(41,128,185,0.3);
    color: #fff;
}
.addr-hint {
    padding: 6px 12px;
    font: 10px 'Courier New', monospace;
    color: #555;
    text-align: center;
}
</style>
</head>

<div id="coming-soon-banner">Brooklyn, Queens, Bronx, and Staten Island coming soon!</div>

<div id="search-box">

</div>

function legistarUrl(num) {
    const padded = num.replace(/-.*/, '').padStart(4, '0');
    return LEGISTAR_URLS[padded] || ("https://intro.nyc/" + padded + "-2026");
}

(function loadPhotos() {
    for (const [id, url] of Object.entries(PHOTO_URLS)) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => { portraits[id] = img; };
        img.onerror = () => {
            // CORS failed - load without crossOrigin for HTML display
            const img2 = new Image();
            img2.onload = () => { portraits[id] = img2; portraits[id]._htmlOnly = true; };
            img2.src = url + (url.includes('?') ? '&' : '?') + '_cb=1';
        };
        img.src = url;
    }
})();

// ═══════════════════════════
// PRE-RENDER MAP
// ═══════════════════════════
const mapCvs = document.createElement('canvas');
mapCvs.width = MAP_W * TILE; mapCvs.height = MAP_H * TILE;
const mctx = mapCvs.getContext('2d');
function hash(x,y){return((x*374761+y*668265+x*y*13)%1000)/1000;}

(function preRender() {
    for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
            const d = map[y][x], px = x*TILE, py = y*TILE, h = hash(x,y);
            if (d === 0) {
                mctx.fillStyle = h > 0.5 ? WATER : WATER2;
                mctx.fillRect(px,py,TILE,TILE);
                if (h > 0.85) { mctx.fillStyle='#1a4a6c'; mctx.fillRect(px+(h*20|0),py+(h*12|0),5,2); }
                continue;
            }
            if (d === 52) {
                mctx.fillStyle = h > 0.5 ? '#2d5a1e' : '#3a6e2a';
                mctx.fillRect(px,py,TILE,TILE);
                if (h > 0.55) {
                    mctx.fillStyle='#1a3a10'; mctx.fillRect(px+12,py+18,4,10);
                    mctx.fillStyle=h>0.75?'#2a7518':'#3a9528';
                    mctx.beginPath(); mctx.arc(px+14,py+14,9,0,Math.PI*2); mctx.fill();
                }
                if (x%3===0){mctx.fillStyle='#8a7a5a';mctx.fillRect(px+13,py,6,TILE);}
                continue;
            }
            if (d === 53) {
                // Bridge tile
                mctx.fillStyle='#4a4a4a';mctx.fillRect(px,py,TILE,TILE);
                mctx.fillStyle='#666';mctx.fillRect(px+2,py+12,TILE-4,8);
                mctx.fillStyle='#555';mctx.fillRect(px+6,py+4,3,TILE);mctx.fillRect(px+TILE-9,py+4,3,TILE);
                // Cables
                mctx.strokeStyle='#777';mctx.lineWidth=1;
                mctx.beginPath();mctx.moveTo(px+7,py);mctx.lineTo(px+TILE/2,py+10);mctx.lineTo(px+TILE-8,py);mctx.stroke();
                continue;
            }
            if (d === 54) {
                // Ferry dock tile
                mctx.fillStyle='#8B7355';mctx.fillRect(px,py,TILE,TILE);
                mctx.fillStyle='#a08860';mctx.fillRect(px+2,py+4,TILE-4,4);mctx.fillRect(px+2,py+14,TILE-4,4);mctx.fillRect(px+2,py+24,TILE-4,4);
                continue;
            }
            // Gray out non-Manhattan districts (11-51 except D34 and parks/bridges/ferries)
            if(d >= 11 && d <= 51 && d !== 34) {
                mctx.fillStyle = '#2a2a2a'; mctx.fillRect(px,py,TILE,TILE);
                mctx.fillStyle = 'rgba(255,255,255,0.03)'; mctx.fillRect(px,py,TILE,TILE);
                continue;
            }
            mctx.fillStyle = DISTRICT_COLORS[d]; mctx.fillRect(px,py,TILE,TILE);
            if(h>0.4&&h<0.45){mctx.fillStyle='rgba(255,255,255,0.04)';mctx.fillRect(px,py,TILE,TILE);}
            const isStH=y%4===0, isStV=x%5===0;
            if(isStH||isStV){
                mctx.fillStyle=DISTRICT_LIGHT[d]; mctx.globalAlpha=0.35;
                if(isStH) mctx.fillRect(px,py+13,TILE,5);
                if(isStV) mctx.fillRect(px+13,py,5,TILE);
                mctx.globalAlpha=1;
            }
            if(!isStH&&!isStV&&h>0.62){
                const bw=14+(h*14|0),bh=18+(h*10|0),bx=px+(TILE-bw)/2,by=py+(TILE-bh)/2;
                mctx.fillStyle='rgba(0,0,0,0.3)'; mctx.fillRect(bx,by,bw,bh);
                mctx.fillStyle='rgba(255,255,200,0.25)';
                for(let wy=0;wy<3;wy++) for(let wx=0;wx<2;wx++)
                    mctx.fillRect(bx+3+wx*(bw/2-2),by+3+wy*(bh/3-1),3,3);
            }
            if(!isStH&&!isStV&&h<0.12){
                mctx.fillStyle='#1a4a12';mctx.fillRect(px+14,py+20,4,8);
                mctx.fillStyle='#3a8528';mctx.beginPath();mctx.arc(px+16,py+16,7,0,Math.PI*2);mctx.fill();
            }
            if(d>=1&&d<=10){
                const diff=(dx,dy)=>{const nx=x+dx,ny=y+dy;if(nx<0||ny<0||nx>=MAP_W||ny>=MAP_H)return true;const nd=map[ny][nx];return nd!==d&&nd!==0;};
                mctx.fillStyle='rgba(255,255,255,0.2)';
                if(diff(-1,0))mctx.fillRect(px,py,2,TILE);
                if(diff(1,0))mctx.fillRect(px+TILE-2,py,2,TILE);
                if(diff(0,-1))mctx.fillRect(px,py,TILE,2);
                if(diff(0,1))mctx.fillRect(px,py+TILE-2,TILE,2);
            }
        }
    }
})();

let state = 'title';

let nearNPC = null;

let dlg = {active:false, id:null, phase:'greeting', topic:'', text:'', chars:0, ct:0, mi:0, legTab:0, legCursor:0, legScroll:0, socCursor:0, socScroll:0};

// ═══════════════════════════
// INPUT
// ═══════════════════════════
const keys = {};
document.addEventListener('keydown', e => {
    if(searchOpen) return; // address search is active, don't handle game keys
    keys[e.key] = true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Tab','Backspace'].includes(e.key)) e.preventDefault();
    if(state==='title'&&(e.key==='Enter'||e.key===' ')){state='playing';return;}
    if(state==='instructions'&&(e.key==='Escape'||e.key==='Enter'||e.key===' ')){state='playing';return;}
    if(state==='playing'&&e.key==='Escape'){state='instructions';return;}
    if(state==='playing'&&(e.key===' '||e.key==='Enter')&&nearNPC){
        if(nearNPC==='sq') startSquirrelDialogue();
        else if(typeof nearNPC==='string'&&nearNPC.startsWith('ferry_')) startFerryDialogue(parseInt(nearNPC.split('_')[1]));
        else startDialogue(nearNPC);
        return;
    }
    if(state==='dialogue') handleDlgInput(e.key);
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Zoom controls
const zoomLevelEl = document.getElementById('zoom-level');
function updateZoom(newZoom) {
    zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.round(newZoom * 10) / 10));
    zoomLevelEl.textContent = Math.round(zoom * 100) + '%';
}
canvas.addEventListener('wheel', e => {
    e.preventDefault();
    updateZoom(zoom + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
}, {passive: false});
document.getElementById('zoom-in').addEventListener('click', () => updateZoom(zoom + ZOOM_STEP));
document.getElementById('zoom-out').addEventListener('click', () => updateZoom(zoom - ZOOM_STEP));
document.getElementById('zoom-reset').addEventListener('click', () => updateZoom(1.0));
document.addEventListener('keydown', e => {
    if(searchOpen || state === 'dialogue') return;
    if(e.key === '=' || e.key === '+') { updateZoom(zoom + ZOOM_STEP); e.preventDefault(); }
    if(e.key === '-' || e.key === '_') { updateZoom(zoom - ZOOM_STEP); e.preventDefault(); }
    if(e.key === '0') { updateZoom(1.0); e.preventDefault(); }
}, true);

function drawSprite(sx,sy,dir,frame,colors,npcId) {
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(sx+6,sy+27,20,5);
    ctx.fillStyle=colors.pants;
    const lo=frame?3:0;
    ctx.fillRect(sx+8-lo,sy+22,6,7); ctx.fillRect(sx+18+lo,sy+22,6,7);
    ctx.fillStyle=colors.shirt; ctx.fillRect(sx+5,sy+12,22,11);
    ctx.fillStyle=colors.skin;
    const ao=frame?1:0;
    if(dir===1){ctx.fillRect(sx+1,sy+13+ao,5,8);ctx.fillRect(sx+24,sy+13-ao,5,8);}
    else if(dir===2){ctx.fillRect(sx+3,sy+13-ao,5,8);ctx.fillRect(sx+26,sy+13+ao,5,8);}
    else{ctx.fillRect(sx+1,sy+13,5,8);ctx.fillRect(sx+26,sy+13,5,8);}
    ctx.fillStyle=colors.skin; ctx.fillRect(sx+7,sy+2,18,11);
    ctx.fillStyle=colors.hair;
    if(dir===3){ctx.fillRect(sx+7,sy,18,9);}
    else{ctx.fillRect(sx+7,sy,18,5);if(dir===1)ctx.fillRect(sx+7,sy,4,8);if(dir===2)ctx.fillRect(sx+21,sy,4,8);}
    if(dir!==3){
        ctx.fillStyle='#fff';ctx.fillRect(sx+10,sy+5,4,4);ctx.fillRect(sx+18,sy+5,4,4);
        ctx.fillStyle='#111';const ex=dir===1?0:dir===2?2:1;
        ctx.fillRect(sx+10+ex,sy+6,2,2);ctx.fillRect(sx+18+ex,sy+6,2,2);
    }
    if(npcId!=null){
        const bob=Math.sin(Date.now()/300)*3;ctx.textAlign='center';
        if(!visitedMembers.has(npcId)){ctx.fillStyle='#ffff00';ctx.font='bold 20px monospace';ctx.fillText('!',sx+16,sy-6+bob);}
        else{ctx.fillStyle='#44ff44';ctx.font='bold 16px monospace';ctx.fillText('\u2713',sx+16,sy-4+bob);}
        ctx.textAlign='left';
    }
}

function drawSquirrel(sx, sy) {
    const bob = Math.sin(Date.now()/200)*2;
    // Body
    ctx.fillStyle='#8B6914';
    ctx.fillRect(sx+8,sy+14+bob,16,10);
    // Head
    ctx.fillStyle='#A07818';
    ctx.fillRect(sx+10,sy+8+bob,12,8);
    // Ears
    ctx.fillStyle='#8B6914';
    ctx.fillRect(sx+10,sy+5+bob,3,4);
    ctx.fillRect(sx+19,sy+5+bob,3,4);
    // Eyes
    ctx.fillStyle='#000';
    ctx.fillRect(sx+12,sy+10+bob,2,2);
    ctx.fillRect(sx+18,sy+10+bob,2,2);
    // Nose
    ctx.fillStyle='#5a3a08';
    ctx.fillRect(sx+15,sy+13+bob,2,2);
    // Tail (bushy!)
    ctx.fillStyle='#A07818';
    ctx.beginPath();
    ctx.ellipse(sx+6, sy+10+bob, 5, 8, -0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#C89428';
    ctx.beginPath();
    ctx.ellipse(sx+6, sy+8+bob, 3, 5, -0.3, 0, Math.PI*2);
    ctx.fill();
    // Paws
    ctx.fillStyle='#A07818';
    ctx.fillRect(sx+10,sy+24+bob,4,3);
    ctx.fillRect(sx+18,sy+24+bob,4,3);
    // Exclamation mark
    const bob2 = Math.sin(Date.now()/400)*3;
    ctx.fillStyle='#ffff00';ctx.font='bold 16px monospace';ctx.textAlign='center';
    ctx.fillText('!',sx+16,sy+bob2);
    ctx.textAlign='left';
}

const MENU_OPTS = ['1. About this district','2. Landmarks & neighborhoods','3. Current issues','4. Bills & legislation','5. Email this office','6. Goodbye'];
const VISIBLE_BILLS = 4;

function getLegBills() {

}

function startDialogue(id) {

         emCc:'',emSubject:'',emBody:'',emField:0};

function startFerryDialogue(idx) {

}

function startSquirrelDialogue() {
    state='dialogue';
    dlg={active:true,id:'sq',phase:'greeting',text:SQUIRREL.greeting,chars:0,ct:0,mi:0};
}

function handleDlgInput(key) {
    if(!dlg.active) return;
    if(key==='Escape'){
        if(dlg.phase==='email'||dlg.phase==='legislation'||dlg.phase==='issues') {dlg.phase='menu';return;}
        if(dlg.phase==='sqmenu'||dlg.phase==='sqresponse'||dlg.phase==='ferrymenu') {dlg.active=false;state='playing';return;}
        dlg.active=false;state='playing';return;
    }
    if(dlg.phase==='greeting'||dlg.phase==='response'||dlg.phase==='sqresponse'){
        if(key===' '||key==='Enter'){
            if(dlg.chars<dlg.text.length) dlg.chars=dlg.text.length;
            else dlg.phase=(dlg.id==='sq'?'sqmenu':'menu');
        }
        return;
    }
    if(dlg.phase==='sqmenu'){
        const topics = SQUIRREL.topics;
        if(key==='ArrowUp'||key==='w') dlg.mi=Math.max(0,dlg.mi-1);
        else if(key==='ArrowDown'||key==='s') dlg.mi=Math.min(topics.length-1,dlg.mi+1);
        else if(key==='Enter'||key===' ') {
            if(dlg.mi===topics.length-1){dlg.active=false;state='playing';return;}
            if(dlg.mi===5){window.open('https://data.cityofnewyork.us/Environment/2018-Central-Park-Squirrel-Census-Squirrel-Data/vfnx-vebw','_blank');return;}
            dlg.phase='sqresponse';dlg.text=SQUIRREL.responses[dlg.mi];dlg.chars=0;dlg.ct=0;
        } else if(key>='1'&&key<='7'){
            const i=parseInt(key)-1;
            if(i===topics.length-1){dlg.active=false;state='playing';return;}
            if(i===5){window.open('https://data.cityofnewyork.us/Environment/2018-Central-Park-Squirrel-Census-Squirrel-Data/vfnx-vebw','_blank');return;}
            if(i<SQUIRREL.responses.length){dlg.phase='sqresponse';dlg.text=SQUIRREL.responses[i];dlg.chars=0;dlg.ct=0;}
        }
        return;
    }
    if(dlg.phase==='ferrymenu'){
        const dests = FERRIES.filter((_,i) => i !== dlg.ferryIdx);
        if(key==='ArrowUp'||key==='w') dlg.mi=Math.max(0,dlg.mi-1);
        else if(key==='ArrowDown'||key==='s') dlg.mi=Math.min(dests.length,dlg.mi+1);
        else if(key==='Enter'||key===' '){
            if(dlg.mi>=dests.length){dlg.active=false;state='playing';return;}
            const dest=dests[dlg.mi];
            player.x=dest.pos.x*TILE+TILE/2; player.y=dest.pos.y*TILE+TILE/2;
            camera.x=player.x-W/2; camera.y=player.y-H/2;
            camera.x=Math.max(0,Math.min(MAP_W*TILE-W,camera.x));
            camera.y=Math.max(0,Math.min(MAP_H*TILE-H,camera.y));
            dlg.active=false; state='playing';
        }
        return;
    }
    if(dlg.phase==='issues'){
        const links = MEMBERS[dlg.id].social||[];
        const max = Math.max(0, links.length - 1);
        const visCount = 3;
        if(key==='ArrowUp'||key==='w'){
            dlg.socCursor=Math.max(0,dlg.socCursor-1);
            if(dlg.socCursor<dlg.socScroll) dlg.socScroll=dlg.socCursor;
        } else if(key==='ArrowDown'||key==='s'){
            dlg.socCursor=Math.min(max,dlg.socCursor+1);
            if(dlg.socCursor>dlg.socScroll+visCount-1) dlg.socScroll=dlg.socCursor-visCount+1;
        } else if(key==='Enter'){
            if(links.length>0&&links[dlg.socCursor]) window.open(links[dlg.socCursor][2],'_blank');
        } else if(key===' '){
            dlg.phase='menu';
        }
        return;
    }
    if(dlg.phase==='menu'){
        if(key==='ArrowUp'||key==='w') dlg.mi=Math.max(0,dlg.mi-1);
        else if(key==='ArrowDown'||key==='s') dlg.mi=Math.min(5,dlg.mi+1);
        else if(key==='Enter'||key===' ') selectOpt(dlg.mi);
        else if(key>='1'&&key<='6') selectOpt(parseInt(key)-1);
        return;
    }
    if(dlg.phase==='legislation'){
        const bills = getLegBills();
        const max = Math.max(0, bills.length - 1);
        if(key==='ArrowUp'||key==='w') {
            dlg.legCursor = Math.max(0, dlg.legCursor - 1);
            if(dlg.legCursor < dlg.legScroll) dlg.legScroll = dlg.legCursor;
        } else if(key==='ArrowDown'||key==='s') {
            dlg.legCursor = Math.min(max, dlg.legCursor + 1);
            if(dlg.legCursor > dlg.legScroll + VISIBLE_BILLS - 1) dlg.legScroll = dlg.legCursor - VISIBLE_BILLS + 1;
        } else if(key==='Tab'||key==='ArrowLeft'||key==='ArrowRight') {
            dlg.legTab = 1 - dlg.legTab;
            dlg.legCursor = 0; dlg.legScroll = 0;
        } else if(key==='Enter') {
            if(bills.length > 0) {
                const bill = bills[dlg.legCursor];
                if(bill) window.open(legistarUrl(bill[0]), '_blank');
            }
        } else if(key===' '||key==='Escape') {
            dlg.phase='menu';
        }
        return;
    }
    if(dlg.phase==='email'){
        const fields = ['emCc','emSubject','emBody'];
        if(key==='Tab'||(key==='ArrowDown'&&dlg.emField<3)||(key==='ArrowUp'&&dlg.emField>0)){
            if(key==='Tab'||key==='ArrowDown') dlg.emField=Math.min(3,dlg.emField+1);
            else dlg.emField=Math.max(0,dlg.emField-1);
        } else if(dlg.emField===3 && (key==='Enter'||key===' ') && !dlg.emSending){
            // Send via Cloudflare Worker
            const m = MEMBERS[dlg.id];
            if(!dlg.emCc||!dlg.emCc.includes('@')){dlg.emStatus='Enter a valid email in CC';return;}
            if(!dlg.emSubject){dlg.emStatus='Enter a subject';return;}
            if(!dlg.emBody){dlg.emStatus='Enter a message';return;}
            dlg.emSending=true; dlg.emStatus='Sending...';
            fetch('https://council-game-email.danielgolliher.workers.dev',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    toEmail: m.email,
                    fromEmail: dlg.emCc,
                    memberName: m.name,
                    district: m.district,
                    subject: dlg.emSubject,
                    message: dlg.emBody
                })
            }).then(r=>r.json()).then(r=>{
                dlg.emSending=false;
                dlg.emStatus=r.success?'Sent! Check your CC inbox.':'Error: '+(r.error||'Failed');
            }).catch(e=>{
                dlg.emSending=false;
                dlg.emStatus='Network error - try again';
            });
        } else if(dlg.emField < 3){
            const f = fields[dlg.emField];
            if(key==='Backspace'){
                dlg[f]=dlg[f].slice(0,-1);
            } else if(key==='Enter' && dlg.emField===2){
                dlg.emBody+='\n';
            } else if(key.length===1){
                dlg[f]+=key;
            }
        }
        return;
    }
}

function selectOpt(i) {
    const m = MEMBERS[dlg.id];
    if(i===5){dlg.active=false;state='playing';return;}
    if(i===4){dlg.phase='email';dlg.emCc='';dlg.emSubject='';dlg.emBody='';dlg.emField=0;dlg.emSending=false;dlg.emStatus='';return;}
    if(i===3){dlg.phase='legislation';dlg.legTab=0;dlg.legCursor=0;dlg.legScroll=0;return;}
    if(i===2){dlg.phase='issues';dlg.socCursor=0;dlg.socScroll=0;return;}
    const topics=['about','landmarks'];
    dlg.phase='response'; dlg.topic=topics[i]; dlg.text=m[topics[i]]||'...'; dlg.chars=0; dlg.ct=0;
}

function wrapText(text,x,y,maxW,lineH){
    const words=text.split(' ');let line='',ty=y;
    for(const w of words){const t=line+w+' ';
        if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line.trim(),x,ty);line=w+' ';ty+=lineH;}
        else line=t;
    }
    if(line.trim()) ctx.fillText(line.trim(),x,ty);
}

function drawPortrait(id, dx, dy, size) {
    const photo = portraits[id];
    const c = DISTRICT_COLORS[id]||'#555';

    // Border
    ctx.fillStyle = c;
    ctx.fillRect(dx-3, dy-3, size+6, size+6);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(dx-3, dy-3, size+6, size+6);

    if (photo && !photo._htmlOnly) {
        try { ctx.drawImage(photo, dx, dy, size, size); }
        catch(e) { photo._htmlOnly = true; }
    }
    if (photo && photo._htmlOnly) {
        // Use HTML img overlay for cross-origin images that can't be drawn to canvas
        const rect = canvas.getBoundingClientRect();
        const sx = rect.width/W, sy = rect.height/H;
        photoOverlay.src = photo.src;
        photoOverlay.style.display = 'block';
        photoOverlay.style.left = (rect.left - canvas.parentElement.getBoundingClientRect().left + dx*sx) + 'px';
        photoOverlay.style.top = (rect.top - canvas.parentElement.getBoundingClientRect().top + dy*sy) + 'px';
        photoOverlay.style.width = (size*sx) + 'px';
        photoOverlay.style.height = (size*sy) + 'px';
        photoOverlay.style.borderColor = c;
    } else if (!photo) {
        // Placeholder
        ctx.fillStyle = '#222';
        ctx.fillRect(dx, dy, size, size);
        ctx.fillStyle = c;
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        const m = MEMBERS[id];
        const initials = id === 3 ? '?' : m.name.split(' ').map(w=>w[0]).filter(c=>c&&c!=='[').join('');
        ctx.fillText(initials, dx + size/2, dy + size/2 + 5);
        ctx.textAlign = 'left';
    }
}

// ═══════════════════════════
// UPDATE
// ═══════════════════════════
function update() {
    if(state!=='playing') return;
    let dx=0,dy=0;
    if(keys['ArrowLeft']||keys['a']){dx=-SPEED;player.dir=1;}
    if(keys['ArrowRight']||keys['d']){dx=SPEED;player.dir=2;}
    if(keys['ArrowUp']||keys['w']){dy=-SPEED;player.dir=3;}
    if(keys['ArrowDown']||keys['s']){dy=SPEED;player.dir=0;}
    player.moving=dx!==0||dy!==0;
    if(player.moving){
        if(dx&&dy){dx*=0.707;dy*=0.707;}
        const r=8;
        const canGo=(px,py)=>{const tx=Math.floor(px/TILE),ty=Math.floor(py/TILE);if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return false;return map[ty][tx]>0;};
        const nx=player.x+dx;
        if(canGo(nx-r,player.y-r)&&canGo(nx+r,player.y-r)&&canGo(nx-r,player.y+r)&&canGo(nx+r,player.y+r))player.x=nx;
        const ny=player.y+dy;
        if(canGo(player.x-r,ny-r)&&canGo(player.x+r,ny-r)&&canGo(player.x-r,ny+r)&&canGo(player.x+r,ny+r))player.y=ny;
        player.ft++;if(player.ft>8){player.frame=1-player.frame;player.ft=0;}
    }else{player.frame=0;player.ft=0;}
    const tx=Math.floor(player.x/TILE),ty=Math.floor(player.y/TILE);
    const d=(ty>=0&&ty<MAP_H&&tx>=0&&tx<MAP_W)?map[ty][tx]:0;
    if(d>0&&d<=52&&d!==currentDistrict){
        currentDistrict=d;
        if(d<=51) banner={text:`District ${d} - ${DISTRICT_NAMES[d]||''}`,timer:180};
        else if(d===52) banner={text:'Park',timer:180};
    }
    if(banner.timer>0) banner.timer--;
    // Bridge name detection
    if(d===53){
        const bname=getBridgeName(tx,ty);
        if(bname&&bname!==bridgeBanner.lastBridge){
            bridgeBanner={text:bname,timer:180,lastBridge:bname};
        }
    } else { bridgeBanner.lastBridge=''; }
    if(bridgeBanner.timer>0) bridgeBanner.timer--;
    nearNPC=null;
    // Check squirrel first, then ferries, then members
    const sqx=SQUIRREL.pos.x*TILE+TILE/2, sqy=SQUIRREL.pos.y*TILE+TILE/2;
    if(Math.hypot(player.x-sqx,player.y-sqy)<TILE*2){nearNPC='sq';}
    else {
        // Check ferry terminals
        for(let fi=0;fi<FERRIES.length;fi++){
            const f=FERRIES[fi];const fx=f.pos.x*TILE+TILE/2,fy=f.pos.y*TILE+TILE/2;
            if(Math.hypot(player.x-fx,player.y-fy)<TILE*2){nearNPC='ferry_'+fi;break;}
        }
        if(!nearNPC) for(const[id,m]of Object.entries(MEMBERS)){
            const did=parseInt(id);
            if(did>=11&&did<=51&&did!==34) continue; // outer boroughs coming soon
            const nx=m.pos.x*TILE+TILE/2,ny=m.pos.y*TILE+TILE/2;
            if(Math.hypot(player.x-nx,player.y-ny)<TILE*2){nearNPC=did;break;}
        }
    }
    const vw=W/zoom, vh=H/zoom; // viewport size in world pixels
    camera.x+=((player.x-vw/2)-camera.x)*0.1;
    camera.y+=((player.y-vh/2)-camera.y)*0.1;
    camera.x=Math.max(0,Math.min(MAP_W*TILE-vw,camera.x));
    camera.y=Math.max(0,Math.min(MAP_H*TILE-vh,camera.y));
    if(visitedMembers.size===10&&!completionShown){completionShown=true;completionTimer=360;}
    if(completionTimer>0) completionTimer--;
}

// ═══════════════════════════
// RENDER
// ═══════════════════════════
function render() {
    ctx.clearRect(0,0,W,H);
    if(state==='title'){renderTitle();return;}
    if(state==='instructions'){renderInstructions();return;}

    // World rendering (zoomed)
    const vw=W/zoom, vh=H/zoom;
    ctx.save();
    ctx.scale(zoom,zoom);
    ctx.translate(-camera.x,-camera.y);

    // Map (draw only visible portion for performance)
    const sx=Math.max(0,Math.floor(camera.x)),sy=Math.max(0,Math.floor(camera.y));
    const sw=Math.min(mapCvs.width-sx,Math.ceil(vw)+TILE),sh=Math.min(mapCvs.height-sy,Math.ceil(vh)+TILE);
    ctx.drawImage(mapCvs, sx, sy, sw, sh, sx, sy, sw, sh);

    // NPCs (world space - transform handles camera offset)
    for(const[id,m]of Object.entries(MEMBERS)){
        const did=parseInt(id);
        if(did>=11&&did<=51&&did!==34) continue; // outer boroughs coming soon
        const sx=m.pos.x*TILE,sy=m.pos.y*TILE;
        const scx=sx-camera.x,scy=sy-camera.y;
        if(scx>-TILE*2/zoom&&scx<vw+TILE&&scy>-TILE*2/zoom&&scy<vh+TILE){
            const npcPx=m.pos.x*TILE+TILE/2,npcPy=m.pos.y*TILE+TILE/2;
            const ddx=player.x-npcPx,ddy=player.y-npcPy;
            const ndir=Math.abs(ddx)>Math.abs(ddy)?(ddx>0?2:1):(ddy>0?0:3);
            ctx.shadowColor=DISTRICT_COLORS[parseInt(id)]||'#fff';ctx.shadowBlur=12;
            drawSprite(sx,sy,ndir,0,m.color,parseInt(id));
            ctx.shadowBlur=0;
        }
    }

    // Ferry terminals (world space)
    for(const f of FERRIES){
        const fx=f.pos.x*TILE, fy=f.pos.y*TILE;
        const fcx=fx-camera.x,fcy=fy-camera.y;
        if(fcx>-TILE*2/zoom&&fcx<vw+TILE&&fcy>-TILE*2/zoom&&fcy<vh+TILE){
            ctx.fillStyle='#8B7355';ctx.fillRect(fx+4,fy+20,24,10);
            ctx.fillStyle='#2a6a9c';ctx.fillRect(fx+2,fy+28,28,4);
            ctx.fillStyle='#fff';ctx.fillRect(fx+8,fy+8,16,14);
            ctx.fillStyle='#2980b9';ctx.fillRect(fx+10,fy+10,12,8);
            ctx.fillStyle='#e74c3c';ctx.fillRect(fx+14,fy+2,2,8);ctx.fillRect(fx+16,fy+2,6,4);
            const bob=Math.sin(Date.now()/400)*2;
            ctx.fillStyle='#3498db';ctx.font='bold 10px monospace';ctx.textAlign='center';
            ctx.fillText('FERRY',fx+16,fy-2+bob);ctx.textAlign='left';
        }
    }

    // Squirrel (world space)
    const sqsx=SQUIRREL.pos.x*TILE, sqsy=SQUIRREL.pos.y*TILE;
    if(sqsx-camera.x>-TILE*2&&sqsx-camera.x<vw+TILE&&sqsy-camera.y>-TILE*2&&sqsy-camera.y<vh+TILE){
        drawSquirrel(sqsx,sqsy);
    }

    // Player (world space)
    const psx=player.x-TILE/2,psy=player.y-TILE/2;
    drawSprite(psx,psy,player.dir,player.frame,{shirt:'#3366cc',hair:'#2c1810',skin:'#d4a574',pants:'#2c3e50'},null);

    ctx.restore(); // End world transform — everything below is screen-space HUD

    if(nearNPC&&state==='playing'){
        ctx.fillStyle='rgba(0,0,0,0.75)';
        ctx.fillRect(W/2-110,H-85,220,30);ctx.strokeStyle='#aaa';ctx.strokeRect(W/2-110,H-85,220,30);
        ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.textAlign='center';
        ctx.fillText('Press SPACE to talk',W/2,H-65);ctx.textAlign='left';
    }

    if(banner.timer>0){
        let a=1;if(banner.timer>150)a=(180-banner.timer)/30;else if(banner.timer<30)a=banner.timer/30;
        ctx.globalAlpha=a;ctx.fillStyle='rgba(0,0,0,0.85)';
        ctx.fillRect(W/2-210,55,420,50);ctx.strokeStyle=DISTRICT_COLORS[currentDistrict]||'#fff';
        ctx.lineWidth=2;ctx.strokeRect(W/2-210,55,420,50);
        ctx.fillStyle='#fff';ctx.font='bold 18px monospace';ctx.textAlign='center';
        ctx.fillText(banner.text,W/2,86);ctx.textAlign='left';ctx.lineWidth=1;ctx.globalAlpha=1;
    }

    // Bridge banner
    if(bridgeBanner.timer>0){
        let a=1;if(bridgeBanner.timer>150)a=(180-bridgeBanner.timer)/30;else if(bridgeBanner.timer<30)a=bridgeBanner.timer/30;
        ctx.globalAlpha=a;ctx.fillStyle='rgba(40,40,40,0.9)';
        const bw=ctx.measureText(bridgeBanner.text).width+60;
        ctx.fillRect(W/2-bw/2,110,bw,36);ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.strokeRect(W/2-bw/2,110,bw,36);
        ctx.fillStyle='#ccc';ctx.font='bold 14px monospace';ctx.textAlign='center';
        ctx.fillText(bridgeBanner.text,W/2,133);
        ctx.textAlign='left';ctx.lineWidth=1;ctx.globalAlpha=1;
    }

    // HUD top-left
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(8,8,220,48);
    ctx.strokeStyle=DISTRICT_COLORS[currentDistrict]||'#555';ctx.strokeRect(8,8,220,48);
    ctx.font='12px monospace';
    if(currentDistrict===52){ctx.fillStyle='#fff';ctx.fillText('Park',16,26);ctx.fillStyle='#4a9e38';ctx.fillText('Green space',16,44);}
    else if(MEMBERS[currentDistrict]){ctx.fillStyle='#fff';ctx.fillText(MEMBERS[currentDistrict].district,16,26);ctx.fillStyle=DISTRICT_COLORS[currentDistrict];ctx.fillText(MEMBERS[currentDistrict].name.substring(0,28),16,44);}

    // Progress
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(W-290,8,282,58);ctx.strokeStyle='#555';ctx.strokeRect(W-290,8,282,58);
    ctx.fillStyle='#fff';ctx.font='12px monospace';ctx.fillText(`Met: ${visitedMembers.size}/10`,W-282,24);
    for(let i=1;i<=51;i++){
        const row=i<=26?0:1;const col=i<=26?i-1:i-27;
        const px=W-282+col*10.5;const py=34+row*12;
        ctx.fillStyle=visitedMembers.has(i)?DISTRICT_COLORS[i]||'#4a4':'#333';ctx.fillRect(px,py,9,9);
    }

    renderMinimap();
    if(state==='dialogue'&&dlg.active) renderDialogue();
    else photoOverlay.style.display='none';

    if(completionTimer>0){
        let a=1;if(completionTimer>330)a=(360-completionTimer)/30;else if(completionTimer<30)a=completionTimer/30;
        ctx.globalAlpha=a;ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(W/2-250,H/2-50,500,100);
        ctx.strokeStyle='#ffd700';ctx.lineWidth=3;ctx.strokeRect(W/2-250,H/2-50,500,100);
        ctx.fillStyle='#ffd700';ctx.font='bold 22px monospace';ctx.textAlign='center';
        ctx.fillText('ALL 10 MANHATTAN MEMBERS MET!',W/2,H/2-10);
        ctx.fillStyle='#fff';ctx.font='14px monospace';
        ctx.fillText("You've explored every NYC council district across all 5 boroughs.",W/2,H/2+20);
        ctx.textAlign='left';ctx.lineWidth=1;ctx.globalAlpha=1;
    }
}

function renderMinimap() {
    const mmS=120,mmW=mmS,mmH=mmS,mx=W-mmW-14,my=H-mmH-14;
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(mx-3,my-3,mmW+6,mmH+6);
    ctx.strokeStyle='#555';ctx.strokeRect(mx-3,my-3,mmW+6,mmH+6);
    const sx=mmW/MAP_W,sy=mmH/MAP_H;
    for(let y=0;y<MAP_H;y+=2)for(let x=0;x<MAP_W;x+=2){
        const d=map[y][x];if(d===0)continue;
        ctx.fillStyle=d===52?'#3a8c28':(DISTRICT_COLORS[d]||'#666');
        ctx.fillRect(mx+x*sx,my+y*sy,Math.ceil(sx*2),Math.ceil(sy*2));
    }
    const ppx=mx+(player.x/TILE)*sx,ppy=my+(player.y/TILE)*sy;
    ctx.fillStyle='#fff';ctx.fillRect(ppx-2,ppy-2,4,4);
    if(Math.floor(Date.now()/400)%2){ctx.fillStyle='#ff0';ctx.fillRect(ppx-1,ppy-1,3,3);}
}

function renderDialogue() {
    if(dlg.id==='sq') { renderSquirrelDialogue(); return; }
    if(dlg.id==='ferry') { renderFerryDialogue(); return; }
    const m = MEMBERS[dlg.id]; if(!m) return;
    const boxH = 220, boxY = H - boxH - 10;
    const c = DISTRICT_COLORS[dlg.id]||'#888';
    const PORTRAIT_SIZE = 84;
    const textX = 36 + PORTRAIT_SIZE + 12; // after portrait + gap
    const textW = W - textX - 30;

    // Box
    ctx.fillStyle='rgba(8,8,24,0.95)';ctx.fillRect(16,boxY,W-32,boxH);
    ctx.strokeStyle=c;ctx.lineWidth=3;ctx.strokeRect(16,boxY,W-32,boxH);ctx.lineWidth=1;

    // Name plate
    ctx.font='bold 13px monospace';
    const partyTag = m.party ? ` [${m.party.charAt(0)}]` : '';
    const nameStr = `${m.name}  (${m.district})`;
    const fullStr = nameStr + partyTag;
    const npW = ctx.measureText(fullStr).width + 24;
    ctx.fillStyle=c;
    ctx.fillRect(textX-4,boxY-14,npW,28);ctx.strokeStyle='#ddd';ctx.strokeRect(textX-4,boxY-14,npW,28);
    ctx.fillStyle='#fff';ctx.fillText(nameStr,textX+6,boxY+4);
    if(m.party){ctx.fillStyle='#aaa';ctx.fillText(partyTag,textX+6+ctx.measureText(nameStr).width,boxY+4);}

    // Portrait
    drawPortrait(dlg.id, 30, boxY + 18, PORTRAIT_SIZE);

    if(dlg.phase==='greeting'||dlg.phase==='response') {
        dlg.ct++; if(dlg.ct>=1){dlg.chars=Math.min(dlg.text.length,dlg.chars+2);dlg.ct=0;}
        ctx.fillStyle='#eee';ctx.font='14px monospace';
        wrapText(dlg.text.substring(0,dlg.chars),textX,boxY+36,textW,18);
        if(dlg.chars>=dlg.text.length&&Math.floor(Date.now()/500)%2){
            ctx.fillStyle='#aaa';ctx.font='12px monospace';ctx.textAlign='right';
            ctx.fillText('SPACE \u25bc',W-40,boxY+boxH-14);ctx.textAlign='left';
        }
    }

    if(dlg.phase==='menu') {
        ctx.fillStyle='#ccc';ctx.font='14px monospace';ctx.fillText('What would you like to know?',textX,boxY+36);
        MENU_OPTS.forEach((opt,i) => {
            const oy = boxY + 58 + i * 24;
            ctx.fillStyle = i===dlg.mi ? c : '#666';
            ctx.font = i===dlg.mi ? 'bold 13px monospace' : '13px monospace';
            ctx.fillText((i===dlg.mi?'\u25b6 ':'  ')+opt, textX, oy);
        });
    }

    if(dlg.phase==='legislation') {
        const bills = getLegBills();
        const priCount = (LEGIS[dlg.id]||[]).length;
        const coCount = (COLEGIS[dlg.id]||[]).length;

        // Tab bar
        const tabY = boxY + 26;
        // Primary tab
        const priLabel = `PRIMARY (${priCount})`;
        const coLabel = `CO-SPONSORED (${coCount})`;
        ctx.font = 'bold 12px monospace';
        const priW = ctx.measureText(priLabel).width + 16;
        const coW = ctx.measureText(coLabel).width + 16;

        // Primary tab bg
        ctx.fillStyle = dlg.legTab === 0 ? c : '#333';
        ctx.globalAlpha = dlg.legTab === 0 ? 0.8 : 0.4;
        ctx.fillRect(textX, tabY - 12, priW, 18);
        ctx.globalAlpha = 1;
        ctx.fillStyle = dlg.legTab === 0 ? '#fff' : '#999';
        ctx.fillText(priLabel, textX + 8, tabY);

        // Co-sponsored tab bg
        ctx.fillStyle = dlg.legTab === 1 ? c : '#333';
        ctx.globalAlpha = dlg.legTab === 1 ? 0.8 : 0.4;
        ctx.fillRect(textX + priW + 6, tabY - 12, coW, 18);
        ctx.globalAlpha = 1;
        ctx.fillStyle = dlg.legTab === 1 ? '#fff' : '#999';
        ctx.fillText(coLabel, textX + priW + 14, tabY);

        // Tab hint
        ctx.fillStyle = '#555'; ctx.font = '10px monospace';
        ctx.fillText('TAB to switch', textX + priW + coW + 20, tabY);

        // Bill list
        const listY = tabY + 14;
        const rowH = 34;

        if (bills.length === 0) {
            ctx.fillStyle = '#666'; ctx.font = '13px monospace';
            ctx.fillText(dlg.id === 3 ? 'Seat vacant - no current legislation' : 'No bills in this category', textX, listY + 16);
        } else {
            for (let vi = 0; vi < VISIBLE_BILLS && dlg.legScroll + vi < bills.length; vi++) {
                const idx = dlg.legScroll + vi;
                const bill = bills[idx];
                const by = listY + vi * rowH;
                const isSelected = idx === dlg.legCursor;

                // Highlight bar
                if (isSelected) {
                    ctx.fillStyle = c; ctx.globalAlpha = 0.2;
                    ctx.fillRect(textX - 4, by - 2, textW + 8, rowH - 2);
                    ctx.globalAlpha = 1;
                }

                // Cursor
                ctx.fillStyle = isSelected ? '#fff' : '#888';
                ctx.font = 'bold 12px monospace';
                ctx.fillText(isSelected ? '\u25b6' : ' ', textX - 2, by + 10);

                // Bill number
                ctx.fillStyle = isSelected ? '#fff' : '#ccc';
                ctx.font = 'bold 11px monospace';
                ctx.fillText(`Int ${bill[0]}`, textX + 14, by + 10);

                // Status badge
                const sc = STATUS_COLOR[bill[2]] || '#888';
                const sl = STATUS_LABEL[bill[2]] || bill[2];
                ctx.fillStyle = sc; ctx.font = 'bold 9px monospace';
                const badgeX = textX + 100;
                ctx.globalAlpha = 0.3; ctx.fillRect(badgeX, by, ctx.measureText(sl).width + 8, 13); ctx.globalAlpha = 1;
                ctx.fillStyle = sc;
                ctx.fillText(sl, badgeX + 4, by + 10);

                // Title
                ctx.fillStyle = isSelected ? '#ddd' : '#888';
                ctx.font = '11px monospace';
                let title = bill[1];
                const maxTitleW = textW - 20;
                while (ctx.measureText(title).width > maxTitleW && title.length > 15) title = title.slice(0, -4) + '...';
                ctx.fillText(title, textX + 14, by + 24);
            }

            // Scroll indicators
            if (dlg.legScroll > 0) {
                ctx.fillStyle = '#aaa'; ctx.font = '12px monospace'; ctx.textAlign = 'right';
                ctx.fillText('\u25b2 more', W - 40, listY + 6); ctx.textAlign = 'left';
            }
            if (dlg.legScroll + VISIBLE_BILLS < bills.length) {
                ctx.fillStyle = '#aaa'; ctx.font = '12px monospace'; ctx.textAlign = 'right';
                ctx.fillText('\u25bc more', W - 40, listY + VISIBLE_BILLS * rowH - 8); ctx.textAlign = 'left';
            }
        }

        // Footer
        ctx.fillStyle = '#666'; ctx.font = '11px monospace';
        const pos = bills.length > 0 ? `${dlg.legCursor + 1}/${bills.length}` : '0/0';
        ctx.fillText(`${pos}  |  \u2191\u2193 Scroll  |  ENTER: Legistar  |  SPACE: Back`, textX, boxY + boxH - 12);
    }

    if(dlg.phase==='email') {
        const fields = ['emCc','emSubject','emBody'];
        const labels = ['CC (your email):','Subject:','Message:'];
        const toEmail = m.email||'';
        const blink = Math.floor(Date.now()/500)%2;

        // Header
        ctx.fillStyle='#fff';ctx.font='bold 13px monospace';
        ctx.fillText('EMAIL YOUR COUNCIL MEMBER', textX, boxY+30);

        // To field (read-only)
        ctx.fillStyle='#888';ctx.font='11px monospace';
        ctx.fillText('To:', textX, boxY+48);
        ctx.fillStyle='#fff';ctx.font='12px monospace';
        ctx.fillText(toEmail, textX+52, boxY+48);

        // Editable fields
        const fieldY = [boxY+66, boxY+88, boxY+110];
        const fieldH = [16, 16, 70];

        for(let fi=0; fi<3; fi++){
            const fy = fieldY[fi];
            const fh = fieldH[fi];
            const isFoc = dlg.emField===fi;
            const val = dlg[fields[fi]];

            // Label
            ctx.fillStyle=isFoc?'#fff':'#888';ctx.font='11px monospace';
            ctx.fillText(labels[fi], textX, fy);

            // Input box
            const inputX = textX + (fi===2 ? 0 : labels[fi].length*6.6+10);
            const inputY = fi===2 ? fy+4 : fy-10;
            const inputW = fi===2 ? textW : textW - (inputX - textX);
            const inputH = fh;

            ctx.fillStyle=isFoc?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.03)';
            ctx.fillRect(inputX, inputY, inputW, inputH);
            ctx.strokeStyle=isFoc?c:'#444';ctx.lineWidth=1;
            ctx.strokeRect(inputX, inputY, inputW, inputH);

            // Text content
            ctx.fillStyle=isFoc?'#fff':'#bbb';ctx.font='11px monospace';
            if(fi===2){
                // Multi-line body
                const bodyLines = val.split('\n');
                for(let li=0;li<Math.min(bodyLines.length,4);li++){
                    let line = bodyLines[li];
                    if(ctx.measureText(line).width > inputW-8) line=line.slice(0,Math.floor((inputW-8)/6.6));
                    ctx.fillText(line, inputX+4, inputY+13+li*14);
                }
                // Cursor
                if(isFoc && blink){
                    const lastLine = bodyLines[bodyLines.length-1]||'';
                    const curLine = Math.min(bodyLines.length-1, 3);
                    const cx = inputX+4+ctx.measureText(lastLine).width;
                    ctx.fillStyle=c;ctx.fillRect(cx, inputY+3+curLine*14, 2, 12);
                }
            } else {
                let dispVal = val;
                if(ctx.measureText(dispVal).width > inputW-8) dispVal='...'+dispVal.slice(-(Math.floor((inputW-16)/6.6)));
                ctx.fillText(dispVal, inputX+4, inputY+12);
                // Cursor
                if(isFoc && blink){
                    const cx = inputX+4+ctx.measureText(val).width;
                    ctx.fillStyle=c;ctx.fillRect(Math.min(cx,inputX+inputW-6), inputY+3, 2, 12);
                }
            }

            // Placeholder
            if(!val && !isFoc){
                ctx.fillStyle='#555';ctx.font='italic 10px monospace';
                const ph = fi===0?'your@email.com':fi===1?'Enter subject...':'Type your message...';
                ctx.fillText(ph, inputX+4, fi===2?inputY+13:inputY+12);
            }
        }

        // Send button
        const btnY = boxY + boxH - 34;
        const btnW = 120;
        const isSendFoc = dlg.emField===3;
        ctx.fillStyle=isSendFoc?c:'#444';
        ctx.globalAlpha=isSendFoc?0.8:0.5;
        ctx.fillRect(textX, btnY, btnW, 22);
        ctx.globalAlpha=1;
        ctx.strokeStyle=isSendFoc?'#fff':'#666';
        ctx.strokeRect(textX, btnY, btnW, 22);
        ctx.fillStyle='#fff';ctx.font='bold 12px monospace';ctx.textAlign='center';
        ctx.fillText(dlg.emSending?'SENDING...':'SEND EMAIL', textX+btnW/2, btnY+15);
        ctx.textAlign='left';

        // Status message
        if(dlg.emStatus){
            const isErr = dlg.emStatus.startsWith('Error')||dlg.emStatus.startsWith('Enter')||dlg.emStatus.startsWith('Network');
            ctx.fillStyle=dlg.emStatus.startsWith('Sent')?'#2ecc71':isErr?'#e74c3c':'#f1c40f';
            ctx.font='bold 11px monospace';
            ctx.fillText(dlg.emStatus, textX+btnW+12, btnY+10);
        }

        // Footer
        ctx.fillStyle='#666';ctx.font='10px monospace';
        ctx.fillText('TAB/\u2191\u2193: switch fields  |  ENTER: send  |  ESC: back', textX, boxY+boxH-12);
    }

    if(dlg.phase==='issues') {
        const links = m.social||[];
        const PLATFORM_COLORS = {X:'#1da1f2',Facebook:'#1877f2',Instagram:'#e4405f',Threads:'#999',Bluesky:'#0085ff'};

        // Issues text at top
        ctx.fillStyle='#eee';ctx.font='13px monospace';
        wrapText(m.issues, textX, boxY+34, textW, 16);

        // Social blurb
        const socY = boxY + 90;
        ctx.fillStyle='#ccc';ctx.font='italic 11px monospace';
        ctx.fillText("And if you want to know what I'm saying on other things, check out my social media!", textX, socY);

        if(links.length === 0){
            ctx.fillStyle='#666';ctx.font='12px monospace';
            ctx.fillText('No social media accounts listed', textX, socY + 22);
        } else {
            const listY = socY + 14;
            const rowH = 26;
            const visCount = 3;
            for(let vi=0; vi<visCount && dlg.socScroll+vi<links.length; vi++){
                const idx = dlg.socScroll + vi;
                const link = links[idx];
                const ly = listY + vi * rowH;
                const isSel = idx === dlg.socCursor;

                if(isSel){ctx.fillStyle=c;ctx.globalAlpha=0.15;ctx.fillRect(textX-4,ly,textW+8,rowH-2);ctx.globalAlpha=1;}

                // Cursor
                ctx.fillStyle=isSel?'#fff':'#888';ctx.font='bold 11px monospace';
                ctx.fillText(isSel?'\u25b6':' ',textX-2,ly+12);

                // Platform badge
                const pc = PLATFORM_COLORS[link[0]]||'#888';
                ctx.font='bold 10px monospace';
                const pw = ctx.measureText(link[0]).width+8;
                ctx.fillStyle=pc;ctx.globalAlpha=0.3;ctx.fillRect(textX+12,ly+2,pw,14);ctx.globalAlpha=1;

                // Handle
                ctx.fillStyle=isSel?'#fff':'#aaa';ctx.font='11px monospace';

            }

            // Scroll indicators
            if(dlg.socScroll>0){ctx.fillStyle='#aaa';ctx.font='10px monospace';ctx.textAlign='right';ctx.fillText('\u25b2',W-40,listY+6);ctx.textAlign='left';}

        ctx.fillText('\u2191\u2193 Scroll  |  ENTER: Open  |  SPACE: Back', textX, boxY+boxH-12);

}

// ═══════════════════════════
// ADDRESS SEARCH
// ═══════════════════════════
const searchBox = document.getElementById('search-box');
const addrInput = document.getElementById('addr-input');
const addrResults = document.getElementById('addr-results');
let searchOpen = false;
let searchTimeout = null;
let searchSelIdx = -1;

// Map coordinates (must match the projection used to generate tile map)
const GEO_MIN_LON=-74.26, GEO_MAX_LON=-74.26+224/400, GEO_MIN_LAT=40.92-184/434.78, GEO_MAX_LAT=40.92;

function openSearch() {
    searchOpen = true;
    searchBox.classList.add('active');
    addrInput.value = '';
    addrResults.innerHTML = '';
    searchSelIdx = -1;
    setTimeout(() => addrInput.focus(), 50);
}

function closeSearch() {
    searchOpen = false;
    searchBox.classList.remove('active');
    addrInput.blur();
    addrResults.innerHTML = '';
    canvas.focus();
}

function teleportTo(lon, lat) {
    const tx = (lon - GEO_MIN_LON) / (GEO_MAX_LON - GEO_MIN_LON) * MAP_W;
    const ty = (1 - (lat - GEO_MIN_LAT) / (GEO_MAX_LAT - GEO_MIN_LAT)) * MAP_H;
    const txi = Math.floor(tx), tyi = Math.floor(ty);

    // Find nearest land tile if the exact spot is water
    let destX = tx, destY = ty;
    if (txi < 0 || tyi < 0 || txi >= MAP_W || tyi >= MAP_H || map[tyi][txi] === 0) {
        let best = null;
        for (let dy = -5; dy <= 5; dy++) {
            for (let dx = -5; dx <= 5; dx++) {
                const nx = txi+dx, ny = tyi+dy;
                if (nx >= 0 && ny >= 0 && nx < MAP_W && ny < MAP_H && map[ny][nx] > 0) {
                    const d = dx*dx + dy*dy;
                    if (!best || d < best.d) best = {d, x:nx, y:ny};
                }
            }
        }
        if (best) { destX = best.x + 0.5; destY = best.y + 0.5; }
    }

    player.x = destX * TILE;
    player.y = destY * TILE;
    camera.x = player.x - W/2;
    camera.y = player.y - H/2;
    camera.x = Math.max(0, Math.min(MAP_W*TILE-W, camera.x));
    camera.y = Math.max(0, Math.min(MAP_H*TILE-H, camera.y));
    closeSearch();
    if (state === 'title') state = 'playing';
}

function fetchSuggestions(text) {
    if (text.length < 3) { addrResults.innerHTML = ''; return; }
    fetch(`https://geosearch.planninglabs.nyc/v2/autocomplete?text=${encodeURIComponent(text)}`)
        .then(r => r.json())
        .then(data => {
            const features = (data.features || []).slice(0, 8);
            searchSelIdx = -1;
            if (features.length === 0) {
                addrResults.innerHTML = '<div class="addr-hint">No results found</div>';
                return;
            }
            addrResults.innerHTML = features.map((f, i) =>
                `<div class="addr-result" data-idx="${i}" data-lon="${f.geometry.coordinates[0]}" data-lat="${f.geometry.coordinates[1]}">${f.properties.label}</div>`
            ).join('') + '<div class="addr-hint">Powered by NYC Planning Labs GeoSearch</div>';

            addrResults.querySelectorAll('.addr-result').forEach(el => {
                el.addEventListener('click', () => {
                    teleportTo(parseFloat(el.dataset.lon), parseFloat(el.dataset.lat));
                });
            });
        })
        .catch(() => {
            addrResults.innerHTML = '<div class="addr-hint">Search error</div>';
        });
}

addrInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => fetchSuggestions(addrInput.value), 250);
});

addrInput.addEventListener('keydown', (e) => {
    const items = addrResults.querySelectorAll('.addr-result');
    if (e.key === 'Escape') { closeSearch(); e.preventDefault(); return; }
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        searchSelIdx = Math.min(items.length - 1, searchSelIdx + 1);
        items.forEach((el, i) => el.classList.toggle('selected', i === searchSelIdx));
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        searchSelIdx = Math.max(-1, searchSelIdx - 1);
        items.forEach((el, i) => el.classList.toggle('selected', i === searchSelIdx));
    } else if (e.key === 'Enter' && searchSelIdx >= 0 && items[searchSelIdx]) {
        e.preventDefault();
        const el = items[searchSelIdx];
        teleportTo(parseFloat(el.dataset.lon), parseFloat(el.dataset.lat));
    }
    e.stopPropagation(); // Don't let game input handler see these keys
});

// Prevent game keys while search is open
const origKeyDown = document.onkeydown;
document.addEventListener('keydown', (e) => {
    if (searchOpen && e.target === addrInput) return; // let input handle it
    if (!searchOpen && e.key === '/' && state !== 'dialogue') {
        e.preventDefault();
        openSearch();
    }
}, true);

// ═══════════════════════════
// 8-BIT MUSIC ENGINE
// ═══════════════════════════
const musicBtn = document.getElementById('music-btn');
let musicPlaying = false;
let audioCtx = null;
let musicInterval = null;

// Pokemon-style overworld melody (note, octave, duration in 16ths)
// Two channels: melody (square wave) and bass (triangle wave)
const MELODY = [
    // Phrase 1 - cheerful walking theme
    ['E',5,2],['G',5,2],['A',5,2],['B',5,2],['A',5,2],['G',5,2],['E',5,4],
    ['D',5,2],['E',5,2],['G',5,2],['A',5,4],['G',5,2],['E',5,2],
    ['D',5,2],['C',5,2],['D',5,2],['E',5,4],['R',0,2],
    // Phrase 2 - adventurous
    ['E',5,2],['G',5,2],['A',5,2],['B',5,2],['C',6,4],['B',5,2],['A',5,2],
    ['G',5,2],['A',5,2],['B',5,4],['A',5,2],['G',5,2],
    ['E',5,2],['D',5,2],['C',5,2],['E',5,4],['R',0,2],
    // Phrase 3 - uplifting
    ['C',5,2],['E',5,2],['G',5,4],['A',5,2],['G',5,2],['E',5,2],['C',5,2],
    ['D',5,2],['F',5,2],['A',5,4],['G',5,2],['F',5,2],
    ['E',5,2],['G',5,2],['B',5,2],['C',6,4],['R',0,4],
    // Phrase 4 - resolution
    ['C',6,2],['B',5,2],['A',5,2],['G',5,2],['A',5,4],['E',5,4],
    ['D',5,2],['E',5,2],['G',5,2],['A',5,2],['G',5,2],['E',5,2],
    ['C',5,4],['R',0,4],['R',0,4],
];

const BASS = [
    ['C',3,4],['C',3,4],['A',2,4],['A',2,4],['F',2,4],['F',2,4],['G',2,4],['G',2,4],
    ['C',3,4],['C',3,4],['A',2,4],['A',2,4],['D',3,4],['D',3,4],['G',2,4],['G',2,4],
    ['C',3,4],['C',3,4],['A',2,4],['A',2,4],['F',2,4],['F',2,4],['G',2,4],['G',2,4],
    ['A',2,4],['A',2,4],['E',2,4],['E',2,4],['F',2,4],['F',2,4],['G',2,4],['G',2,4],
    ['C',3,4],['E',3,4],['G',3,4],['A',3,4],['D',3,4],['F',3,4],['A',3,4],['G',3,4],
    ['C',3,4],['E',3,4],['G',3,4],['C',4,4],['A',2,4],['E',3,4],['G',3,4],['R',0,4],
    ['A',2,4],['A',2,4],['A',2,4],['A',2,4],['F',2,4],['G',2,4],
    ['C',3,8],['R',0,4],['R',0,4],
];

const NOTE_FREQ = {C:261.63,D:293.66,E:329.63,F:349.23,G:392.00,A:440.00,B:493.88};

function getFreq(note, octave) {
    if(note === 'R') return 0;
    return NOTE_FREQ[note] * Math.pow(2, octave - 4);
}

function startMusic() {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();

    const BPM = 140;
    const sixteenth = 60 / BPM / 4;
    let melIdx = 0, melTime = 0;
    let basIdx = 0, basTime = 0;

    function playNote(freq, duration, type, vol) {
        if(freq === 0) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration * 0.9);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function tick() {
        if(!musicPlaying) return;
        // Melody
        if(melTime <= 0 && MELODY.length > 0) {
            const [note, oct, dur] = MELODY[melIdx % MELODY.length];
            const freq = getFreq(note, oct);
            playNote(freq, dur * sixteenth * 0.9, 'square', 0.08);
            melTime = dur;
            melIdx++;
        }
        melTime--;

        // Bass
        if(basTime <= 0 && BASS.length > 0) {
            const [note, oct, dur] = BASS[basIdx % BASS.length];
            const freq = getFreq(note, oct);
            playNote(freq, dur * sixteenth * 0.9, 'triangle', 0.12);
            basTime = dur;
            basIdx++;
        }
        basTime--;
    }

    musicInterval = setInterval(tick, sixteenth * 1000);
    tick();
}

function stopMusic() {
    if(musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

musicBtn.addEventListener('click', () => {
    musicPlaying = !musicPlaying;
    musicBtn.textContent = musicPlaying ? '\u266B ON' : '\u266B OFF';
    musicBtn.classList.toggle('on', musicPlaying);
    if(musicPlaying) startMusic();
    else stopMusic();
});

function loop(){update();render();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
